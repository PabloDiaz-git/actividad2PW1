<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Ejercicio 2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <header>
            <nav>
                <a href="index.html">HOME</a> | <a href="contacto.html">CONTACTO</a>
            </nav>
        </header>

        <main>
            <div class="formulario-gris">
                <form>
                    <div class="campo">
                        <label>Nombre:</label>
                        <input type="text" required>
                    </div>
                    <div class="campo">
                        <label>E-mail:</label>
                        <input type="email" required>
                    </div>
                    <div class="campo">
                        <label>Tel:</label>
                        <input type="tel" required>
                    </div>
                    <div class="campo">
                        <label>Mensaje:</label>
                        <textarea rows="4" required></textarea>
                    </div>
                    <div class="botones-seccion">
                        <button type="submit" class="btn btn-azul">Enviar</button>
                        <button type="reset" class="btn btn-rosa">Cancelar</button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            <p>Todos los derechos reservados</p>
            <a href="../../index.html" class="volver">Volver al Índice de Ejercicios</a>
        </footer>
    </div>
</body>
</html>
